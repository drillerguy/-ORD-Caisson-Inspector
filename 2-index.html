
<!DOCTYPE html>
<html>
<head>
    <title>Full Caisson Calculator + Out-of-Plumb Offset</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; padding: 15px; }
        input, button, select { font-size: 1.2em; margin: 10px 0; padding: 8px; width: 100%; }
        .question { margin-bottom: 15px; }
        .result { font-weight: bold; color: darkgreen; padding-top: 10px; }
    </style>
</head>
<body>

    <h2>Caisson Calculator</h2>

    <div class="question">
        <label>Top of Casing (ft):</label>
        <input id="toc" type="number" step="any">
    </div>
    <div class="question">
        <label>Cut to Top of Shaft (ft):</label>
        <input id="cut" type="number" step="any">
    </div>
    <div class="question">
        <label>Top of Casing to Bottom of Shaft (ft):</label>
        <input id="toc_to_bos" type="number" step="any">
    </div>
    <div class="question">
        <label>Shaft Diameter (inches):</label>
        <input id="shaft_diameter" type="number" step="any">
    </div>

    <h3>Out-of-Plumb Offset</h3>
    <div class="question">
        <label>Angle Out of Plumb (degrees):</label>
        <input id="plumb_angle" type="number" step="any" oninput="showDegreeNote()">
        <div id="degree-note" style="display:none; font-size: 0.9em; color: blue;">
            Angle is assumed to be in degrees (°)
        </div>
    </div>
    <div class="question">
        <label>Depth to CMP (ft):</label>
        <input id="cmp_depth" type="number" step="any">
    </div>

    <button onclick="calculate()">Execute</button>

    <div class="result" id="output"></div>

    <script>
        function showDegreeNote() {
            document.getElementById('degree-note').style.display = 'block';
        }

        function calculate() {
            let toc = parseFloat(document.getElementById("toc").value) || 0;
            let cut = parseFloat(document.getElementById("cut").value) || 0;
            let bos = parseFloat(document.getElementById("toc_to_bos").value) || 0;
            let dia = parseFloat(document.getElementById("shaft_diameter").value) || 0;
            let angle = parseFloat(document.getElementById("plumb_angle").value) || 0;
            let depth_cmp = parseFloat(document.getElementById("cmp_depth").value) || 0;

            let top_shaft = toc - cut;
            let bottom_shaft = toc - bos;
            let shaft_len = top_shaft - bottom_shaft;
            let radius_ft = (dia / 12) / 2;
            let volume_cy = Math.PI * radius_ft * radius_ft * shaft_len / 27;

            let radians = angle * Math.PI / 180;
            let offset_inches = Math.tan(radians) * (depth_cmp * 12);

            document.getElementById("output").innerHTML =
                "Top of Shaft: " + top_shaft.toFixed(2) + " ft<br>" +
                "Bottom of Shaft: " + bottom_shaft.toFixed(2) + " ft<br>" +
                "Total Shaft Length: " + shaft_len.toFixed(2) + " ft<br>" +
                "Concrete Volume: " + volume_cy.toFixed(2) + " yd³<br>" +
                "Offset at CMP: " + offset_inches.toFixed(2) + " inches";
        }
    </script>

</body>
</html>
