const $=id=>document.getElementById(id);

function renderPins(){
 $("pins").innerHTML=HOTSPOTS.map(h=>{
   const r=record(h.caisson), cls=(r.lat!=null||r.notes||r.photos?.length)?"known":"";
   return `<button class="pin ${cls} ${selected===h.caisson?"selected":""}" data-n="${h.caisson}" style="left:${h.x}%;top:${h.y}%">${h.caisson}</button>`;
 }).join("");
 document.querySelectorAll(".pin").forEach(p=>p.onclick=()=>selectCaisson(+p.dataset.n));
}
async function selectCaisson(n){
 selected=n;renderPins();const r=record(n);
 $("panel").innerHTML=`
 <div class="card">
   <h2>Caisson ${n}</h2>
   <span class="badge ${r.verified?"green":"gray"}">${r.verified?"Verified location":"Not verified"}</span>
   <label class="label">Status</label><select id="status">

   <div class="row">
    <div><label class="label">Latitude</label><input id="lat" type="number" step="any" value="${r.lat??""}"></div>
    <div><label class="label">Longitude</label><input id="lon" type="number" step="any" value="${r.lon??""}"></div>
   </div>
   <label class="label">Condition / work stage</label><input id="condition" value="${esc(r.condition||"")}" placeholder="Excavated, standing water, repair...">
   <label class="label">Notes</label><textarea id="notes" rows="4">${esc(r.notes||"")}</textarea>
   <label class="label"><input id="verified" type="checkbox" ${r.verified?"checked":""} style="width:auto"> GPS/location verified</label>
   <button id="save">Save Caisson Information</button>
 </div>
 <div class="card">
   <h2 style="font-size:17px">Photos</h2>
   <input id="photos" type="file" accept="image/*" multiple>
   <button id="addPhotos">Add Photos</button>
   <div id="photoGrid" class="photo-grid" style="margin-top:10px"></div>
   <p class="tiny">Photos are stored locally on this device in the browser.</p>
 </div>`;
 $("save").onclick=()=>{
   records[n]={...r,status:$("status").value,lat:numOrNull($("lat").value),lon:numOrNull($("lon").value),
     condition:$("condition").value,notes:$("notes").value,verified:$("verified").checked,
     updated:new Date().toISOString(),photos:r.photos||[]};
   saveRecords();selectCaisson(n);
 };
 $("addPhotos").onclick=()=>addPhotos(n);
 await showPhotos(n);
 const spot=HOTSPOTS.find(x=>x.caisson===n);
 if(spot){
   const shell=$("mapShell"),map=$("map");
   shell.scrollTo({left:map.offsetWidth*spot.x/100-shell.clientWidth/2,top:map.offsetHeight*spot.y/100-shell.clientHeight/2,behavior:"smooth"});
 }
}
function esc(s){return String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
function numOrNull(v){const n=Number(v);return v!==""&&Number.isFinite(n)?n:null;}
async function addPhotos(n){
 const files=[...$("photos").files];if(!files.length)return;
 const db=await dbPromise,tx=db.transaction("photos","readwrite"),store=tx.objectStore("photos");
 const r=record(n);r.photos=r.photos||[];
 for(const f of files){const id=`${n}-${Date.now()}-${Math.random()}`;store.put({id,caisson:n,name:f.name,type:f.type,blob:f,date:new Date().toISOString()});r.photos.push(id);}
 records[n]=r;saveRecords();tx.oncomplete=()=>selectCaisson(n);
}
async function showPhotos(n){
 const grid=$("photoGrid");if(!grid)return;const ids=record(n).photos||[];if(!ids.length){grid.innerHTML='<span class="tiny">No photos added.</span>';return;}
 const db=await dbPromise,tx=db.transaction("photos"),store=tx.objectStore("photos");
 const photos=await Promise.all(ids.map(id=>new Promise(res=>{const q=store.get(id);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null);})));
 grid.innerHTML=photos.filter(Boolean).map(p=>`<img src="${URL.createObjectURL(p.blob)}" title="${esc(p.name)}">`).join("");
}
$("jump").onclick=()=>{const n=+$("search").value;if(HOTSPOTS.some(x=>x.caisson===n))selectCaisson(n);else alert("That caisson number was not found on this plan.");};
$("search").addEventListener("keydown",e=>{if(e.key==="Enter")$("jump").click();});
$("export").onclick=()=>{
 const clean=Object.fromEntries(Object.entries(records).map(([n,r])=>[n,{...r,photoCount:(r.photos||[]).length,photos:undefined}]));

};
